# ═══════════════════════════════════════════════════════════
#  Nginx config — Premium Animal Hospital Platform
#  Copy to: /etc/nginx/sites-available/vetplatform
#  Then:    sudo ln -s /etc/nginx/sites-available/vetplatform /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════

# Rate limiting — protect login and API endpoints
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/m;

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_HERE;    # <-- change this

    # SSL — get free cert: sudo certbot --nginx -d YOUR_DOMAIN
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Max upload size (pet photos, invoice PDFs)
    client_max_body_size 20M;

    # Static files — served directly by Nginx, never touches Python
    location /static/ {
        alias /home/ahmed/vet/platform/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Login endpoint — strict rate limit (5 attempts/min per IP)
    location /auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:5100;
        include    /etc/nginx/proxy_params;
    }

    # API endpoints — moderate rate limit
    location /api/ {
        limit_req zone=api burst=10;
        proxy_pass http://127.0.0.1:5100;
        include    /etc/nginx/proxy_params;
    }

    # All other requests → Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:5100;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;
    return 301 https://$host$request_uri;
}
