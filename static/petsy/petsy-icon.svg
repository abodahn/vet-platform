<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Left ear -->
  <ellipse cx="18" cy="14" rx="9" ry="12" transform="rotate(-20,18,14)" fill="url(#pg)"/>
  <ellipse cx="18" cy="15" rx="5" ry="7" transform="rotate(-20,18,15)" fill="#f9a8d4"/>

  <!-- Right ear -->
  <ellipse cx="62" cy="14" rx="9" ry="12" transform="rotate(20,62,14)" fill="url(#pg)"/>
  <ellipse cx="62" cy="15" rx="5" ry="7" transform="rotate(20,62,15)" fill="#f9a8d4"/>

  <!-- Chat bubble body -->
  <rect x="6" y="14" width="68" height="50" rx="18" fill="url(#pg)"/>

  <!-- Chat bubble tail (pointing down-left) -->
  <polygon points="22,64 12,78 38,64" fill="#4f46e5"/>

  <!-- Face: white muzzle area -->
  <ellipse cx="40" cy="46" rx="16" ry="11" fill="rgba(255,255,255,0.18)"/>

  <!-- Eyes: whites -->
  <circle cx="28" cy="32" r="7" fill="white"/>
  <circle cx="52" cy="32" r="7" fill="white"/>

  <!-- Eyes: pupils -->
  <circle cx="29" cy="33" r="4" fill="#1e0a3c"/>
  <circle cx="53" cy="33" r="4" fill="#1e0a3c"/>

  <!-- Eye shine -->
  <circle cx="31" cy="31" r="1.5" fill="white"/>
  <circle cx="55" cy="31" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="40" cy="43" rx="5" ry="3.5" fill="#c4b5fd"/>
  <ellipse cx="40" cy="43" rx="3" ry="2" fill="#7c3aed"/>

  <!-- Nostrils -->
  <circle cx="38" cy="44" r="0.8" fill="#4c1d95"/>
  <circle cx="42" cy="44" r="0.8" fill="#4c1d95"/>

  <!-- Smile -->
  <path d="M32 49 Q40 57 48 49" stroke="white" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cheek blushes -->
  <ellipse cx="22" cy="44" rx="5" ry="3" fill="rgba(251,113,133,0.4)"/>
  <ellipse cx="58" cy="44" rx="5" ry="3" fill="rgba(251,113,133,0.4)"/>

  <!-- Whiskers left -->
  <line x1="8" y1="42" x2="26" y2="44" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="46" x2="26" y2="46" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whiskers right -->
  <line x1="72" y1="42" x2="54" y2="44" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="72" y1="46" x2="54" y2="46" stroke="rgba(255,255,255,0.6)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
