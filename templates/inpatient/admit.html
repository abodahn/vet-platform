{% extends "base.html" %}
{% block title %}Admit Patient{% endblock %}
{% block content %}
<div class="pf-page-header">
  <div><h1 class="pf-page-title">🏥 Admit Patient</h1></div>
  <div class="pf-topbar-actions">
    <a href="{{ url_for('inpatient.dashboard') }}" class="pf-btn pf-btn-secondary">← Back</a>
  </div>
</div>

<div class="pf-card" style="max-width:760px;margin:0 auto">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="pf-form-grid">

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Owner *</label>
        <select name="owner_id" id="ownerSelect" class="pf-input" required onchange="loadPets(this.value)">
          <option value="">— select owner —</option>
          {% for o in owners %}
          <option value="{{ o.id }}">{{ o.full_name }} ({{ o.phone }})</option>
          {% endfor %}
        </select>
      </div>

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Pet *</label>
        <select name="pet_id" id="petSelect" class="pf-input" required>
          <option value="">— select owner first —</option>
        </select>
      </div>

      <div class="pf-form-group">
        <label class="pf-label">Ward</label>
        <select name="ward" class="pf-input">
          {% for w in wards %}<option>{{ w }}</option>{% endfor %}
        </select>
      </div>
      <div class="pf-form-group">
        <label class="pf-label">Cage / Kennel Number</label>
        <input type="text" name="cage_number" class="pf-input" placeholder="e.g. K-3">
      </div>

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Reason for Admission *</label>
        <textarea name="reason" class="pf-input" rows="2" required placeholder="Chief complaint / reason for hospitalisation"></textarea>
      </div>

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Initial Diagnosis</label>
        <input type="text" name="diagnosis" class="pf-input" placeholder="Working diagnosis">
      </div>

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Treatment Plan</label>
        <textarea name="treatment_plan" class="pf-input" rows="3" placeholder="IV fluids, monitoring, medications…"></textarea>
      </div>

      <div class="pf-form-group">
        <label class="pf-label">Expected Discharge Date</label>
        <input type="date" name="expected_discharge" class="pf-input" min="{{ today }}">
      </div>
      <div class="pf-form-group">
        <label class="pf-label">Daily Rate (EGP)</label>
        <input type="number" step="0.01" name="daily_rate" class="pf-input" value="0" min="0">
      </div>

    </div>
    <div style="margin-top:1.5rem;display:flex;gap:.75rem;justify-content:flex-end">
      <a href="{{ url_for('inpatient.dashboard') }}" class="pf-btn pf-btn-secondary">Cancel</a>
      <button type="submit" class="pf-btn pf-btn-primary">🏥 Admit Patient</button>
    </div>
  </form>
</div>

<script>
function loadPets(ownerId) {
  const sel = document.getElementById('petSelect');
  sel.innerHTML = '<option value="">Loading…</option>';
  if (!ownerId) { sel.innerHTML = '<option value="">— select owner first —</option>'; return; }
  fetch(`/inpatient/api/owner/${ownerId}/pets`)
    .then(r => r.json())
    .then(pets => {
      sel.innerHTML = pets.length
        ? pets.map(p => `<option value="${p.id}">${p.pet_name} (${p.species})</option>`).join('')
        : '<option value="">No pets found</option>';
    });
}
</script>
{% endblock %}
