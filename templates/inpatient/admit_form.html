{% extends "base.html" %}
{% block title %}Admit Patient{% endblock %}
{% block content %}
<div class="pf-page-header">
  <div>
    <h1 class="pf-page-title">🏥 Admit Patient</h1>
  </div>
  <div class="pf-topbar-actions">
    <a href="{{ url_for('inpatient.dashboard') }}" class="pf-btn pf-btn-secondary">← Back</a>
  </div>
</div>

<div class="pf-card" style="max-width:820px;margin:0 auto">
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="pf-form-grid">

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Pet *</label>
        <select name="pet_id" id="petSelect" class="pf-input" required onchange="fillOwner(this)">
          <option value="">— select pet —</option>
          {% for p in all_pets %}
          <option value="{{ p.id }}" data-owner="{{ p.owner_id }}" data-owner-name="{{ p.owner_name }}"
            {% if pet and pet.id == p.id %}selected{% endif %}>
            {{ p.name }} ({{ p.species }}) — {{ p.owner_name }}
          </option>
          {% endfor %}
        </select>
        <input type="hidden" name="owner_id" id="ownerInput" value="{{ owner.id if owner else '' }}">
      </div>

      <div class="pf-form-group">
        <label class="pf-label">Admitting Doctor</label>
        <select name="admitting_doctor" class="pf-input">
          <option value="">— select doctor —</option>
          {% for d in doctors %}
          <option value="{{ d.full_name }}">{{ d.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="pf-form-group">
        <label class="pf-label">Admission Date *</label>
        <input type="date" name="admission_date" class="pf-input" value="{{ today_date }}" required>
      </div>

      <div class="pf-form-group">
        <label class="pf-label">Ward</label>
        <select name="ward" class="pf-input">
          {% for w in wards %}<option>{{ w }}</option>{% endfor %}
        </select>
      </div>
      <div class="pf-form-group">
        <label class="pf-label">Room / Cage Number</label>
        <input type="text" name="room_number" class="pf-input" placeholder="e.g. A-3">
      </div>

      <div class="pf-form-group">
        <label class="pf-label">Daily Rate (EGP)</label>
        <input type="number" step="0.01" name="daily_rate" class="pf-input" value="0">
      </div>

      <div class="pf-form-group" style="grid-column:1/-1">
        <label class="pf-label">Reason for Admission *</label>
        <textarea name="reason" class="pf-input" rows="3" required placeholder="Chief complaint, reason for hospitalization..."></textarea>
      </div>
    </div>

    <div style="display:flex;gap:12px;margin-top:24px">
      <button type="submit" class="pf-btn pf-btn-primary">🏥 Admit Patient</button>
      <a href="{{ url_for('inpatient.dashboard') }}" class="pf-btn pf-btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
function fillOwner(sel) {
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('ownerInput').value = opt.dataset.owner || '';
}
// Set today's date
document.querySelector('[name=admission_date]').value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
